<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sonrisar Pro{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SELECT2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/sonrisar.css' %}">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=999">

    <style>
        /* =====================================================
           NAVBAR SONRISAR — CORRECCIÓN DEFINITIVA
           ===================================================== */

        .navbar-sonrisar {
            background-color: #26ABA5 !important;
            min-height: 55px !important;   /* ALTURA MÍNIMA, PERO PERMITE AGRANDARSE */
            padding: 0;
        }

        .navbar-sonrisar .navbar-nav {
            align-items: center;
            margin: 0;
            padding: 0;
        }

        .navbar-sonrisar .nav-link {
            height: 55px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 0 20px !important;
            margin: 0 !important;
            color: white !important;
            font-weight: 500;
            line-height: 1 !important;
        }

        .navbar-sonrisar .nav-link:hover {
            text-decoration: underline !important;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
        }

        .navbar {
            padding: 0 !important;
        }

        @media (max-width: 991px) {
            .navbar-collapse {
                background-color: white !important;
                padding: 15px;
            }

            .navbar-collapse .nav-link {
                color: #26ABA5 !important;
                font-weight: 600;
            }
        }

    </style>

</head>

<body>

    <!-- HEADER -->
    <div class="text-center" style="margin:0; padding:0;">
        <img src="/static/img/logo.png" alt="Sonrisar" style="height:110px; display:block; margin:auto;">
        <p style="margin:0; padding:0; font-size:0.9rem;">
            Román Guerra 752 | WhatsApp 092 706 293 | sonrirsarco@gmail.com
        </p>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-expand-lg navbar-sonrisar">

        <div class="container">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda_calendar' %}">Calendario</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda' %}">Agenda del día</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda_week' %}">Agenda semanal</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda_month' %}">Agenda mensual</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'patient_list' %}">Pacientes</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'whatsapp_reminders' %}">WhatsApp</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="text-center text-muted my-4">
        © Sonrisar Pro – Dr. Rodrigo Suma | Todos los derechos reservados
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
