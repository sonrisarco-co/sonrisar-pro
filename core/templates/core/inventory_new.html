{% extends "core/base.html" %}
{% load static %}

{% block title %}Nuevo producto - Sonrisar Pro{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 800px;">
    <h3 class="mb-4">📦 Nuevo producto</h3>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                Guardar
            </button>
            <a href="{% url 'inventory_list' %}" class="btn btn-secondary ms-2">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
