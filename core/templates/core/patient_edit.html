{% extends "core/base.html" %}

{% block title %}Editar paciente | Sonrisar{% endblock %}

{% block content %}

<div class="container mt-4" style="max-width: 600px;">

    <h3 class="mb-4">Editar paciente</h3>

    <form method="POST" class="p-4 shadow rounded bg-white">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control"
                   value="{{ paciente.nombre }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-control"
                   value="{{ paciente.apellido }}">
        </div>

        <div class="mb-3">
            <label class="form-label">C.I.</label>
            <input type="text" name="ci" class="form-control"
                   value="{{ paciente.ci }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de nacimiento</label>
            <input type="date" name="fecha_nacimiento" class="form-control"
                   value="{{ paciente.fecha_nacimiento|date:'Y-m-d' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" class="form-control"
                   value="{{ paciente.telefono }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-control"
                   value="{{ paciente.email }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" name="direccion" class="form-control"
                   value="{{ paciente.direccion }}">
        </div>

        <div class="d-flex justify-content-between mt-4">

            <a href="{% url 'patient_list' %}" class="btn btn-sonrisar-outline">
                Cancelar
            </a>

            <button type="submit" class="btn btn-sonrisar">
                Guardar cambios
            </button>

        </div>

    </form>

</div>

{% endblock %}
