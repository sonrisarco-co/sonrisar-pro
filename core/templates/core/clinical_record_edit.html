{% extends "core/base.html" %}

{% block title %}Editar Historia Clínica{% endblock %}

{% block content %}

<style>
/* ======== ESTILO SONRISAR ======== */

.edit-container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    max-width: 900px;
    margin: auto;
    margin-top: 30px;
    margin-bottom: 40px;
}

.edit-title {
    font-size: 28px;
    color: #26ABA5;
    font-weight: bold;
    margin-bottom: 25px;
    text-align: center;
}

.label-sonrisar {
    font-weight: bold;
    margin-top: 15px;
    margin-bottom: 5px;
}

.input-sonrisar,
.textarea-sonrisar {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.textarea-sonrisar {
    height: 160px;
}

.btn-guardar {
    background: #26ABA5;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    margin-top: 20px;
}

.btn-guardar:hover {
    background: #1f8e8a;
}

.btn-cancelar {
    background: #999;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    text-decoration: none;
    margin-left: 10px;
}

.btn-cancelar:hover {
    background: #777;
}
</style>

<div class="edit-container">

    <h2 class="edit-title">Editar Historia Clínica</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- ===== DATOS DEL PACIENTE ===== -->

        <label class="label-sonrisar">Nombre</label>
        <input type="text" class="input-sonrisar" value="{{ paciente.nombre }}" disabled>

        <label class="label-sonrisar">Apellido</label>
        <input type="text" class="input-sonrisar" value="{{ paciente.apellido }}" disabled>

        <label class="label-sonrisar">CI</label>
        <input type="text" class="input-sonrisar" value="{{ paciente.ci }}" disabled>

        <label class="label-sonrisar">Teléfono</label>
        <input type="text" class="input-sonrisar" value="{{ paciente.telefono }}" disabled>

        <label class="label-sonrisar">Email</label>
        <input type="text" class="input-sonrisar" value="{{ paciente.email }}" disabled>

        <label class="label-sonrisar">Dirección</label>
        <input type="text" class="input-sonrisar" value="{{ paciente.direccion }}" disabled>


        <!-- ===== ODONTOGRAMA ===== -->

        <label class="label-sonrisar">Odontograma</label>
        {% if paciente.odontograma %}
            <p>Actualmente cargado:</p>
            <img src="{{ paciente.odontograma.url }}" style="width:200px; margin-bottom:10px;">
        {% endif %}
        <input type="file" name="odontograma" class="input-sonrisar">


        <!-- ===== NOTAS CLÍNICAS ===== -->

        <label class="label-sonrisar">Notas clínicas</label>
        <textarea name="notas_clinicas" class="textarea-sonrisar">{{ paciente.notas_clinicas }}</textarea>

        <button type="submit" class="btn-guardar">💾 Guardar cambios</button>
        <a href="{% url 'clinical_record_detail' registro.id %}" class="btn-cancelar">Cancelar</a>

    </form>

</div>

{% endblock %}
