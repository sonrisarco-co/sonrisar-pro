<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sonrisar Pro{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SELECT2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    {% load static %}

    <!-- Estilos originales -->
    <link rel="stylesheet" href="{% static 'css/sonrisar2.css' %}?v=999">

</head>

<body>

    <!-- HEADER ORIGINAL -->
    <div class="text-center">
        <img src="/static/img/logo.png" alt="Sonrisar" style="height: 100px;">
        <p style="margin: 0; padding: 0;">
            Román Guerra 752 | WhatsApp 092 706 293 | sonrisarco@gmail.com
        </p>
    </div>

    <!-- NAVBAR ORIGINAL -->
    <nav class="navbar navbar-expand-lg navbar-sonrisar">
        <div class="container-fluid">

            <!-- Botón hamburguesa original -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menú -->
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda_calendar' %}">Calendario</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda' %}">Agenda del día</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda_week' %}">Agenda semanal</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agenda_month' %}">Agenda mensual</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'patient_list' %}">Pacientes</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'whatsapp_reminders' %}">WhatsApp</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center mt-4 mb-3 text-muted">
        © Sonrisar Pro – Dr. Rodrigo Suma | Todos los derechos reservados
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
